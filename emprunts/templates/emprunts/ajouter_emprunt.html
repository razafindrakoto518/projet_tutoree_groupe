{% extends 'base.html' %}

{% block title %}
  enregistrement emprunt
{% endblock %}

{% block content %}
  <div>
    {% if message %}
      <p class="alert alert-warning text-center">{{ message }}</p>
    {% endif %}
    <div>
      <form method="post" class="form">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </form>
    </div>
  </div>
{% endblock %}
